# 单文档 / 发行人配置：换招股书时主要改此文件，而非改 agents 代码。
# 环境变量 DOCUMENT_PROFILE_PATH 可指向其他 profile。

document_id: yushu
issuer:
  legal_name: 宇树科技股份有限公司
  short_names:
    - 宇树科技
    - 宇树
  graph_parent_hint: 宇树

controller:
  names:
    - 王兴兴
  question_keywords:
    - 控制
    - 实际控制人
    - 控股股东
    - 法定代表人

subsidiaries:
  names:
    - 宇树机器人
    - 上海高羿
    - 北京灵翌
    - 深圳天羿
    - 宁波宇树
    - 重庆宇羿
    - 宇树星盟
