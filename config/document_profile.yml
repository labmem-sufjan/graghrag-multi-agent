# 已知模型幻觉 / 历史误答，Critic 直接拒绝
hallucination_patterns:
  - 张阳光
  - Zhang Yangguang
  - Yangguang Zhang

# 招股书领域通用检索扩展（不含公司专有实体，实体由上方 issuer/controller/subsidiaries 注入）
topic_expansions:
  - pattern: "实际控制人|控股股东|控制人|法定代表人"
    terms:
      - 实际控制人
      - 控股股东
      - 表决权
  - pattern: "全资子公司|子公司"
    terms:
      - 发行人子公司
      - 全资子公司
      - 系发行人的全资子公司
  - pattern: "营业收入|净利润|毛利率|财务|扣非"
    terms:
      - 营业收入
      - 净利润
      - 毛利率
      - 万元
  - pattern: "成立|注册地址|基本情况"
    terms:
      - 成立日期
      - 注册地址
      - 发行人基本情况
  - pattern: "风险"
    terms:
      - 风险因素
      - 风险
  - pattern: "主营业务|做什么|业务"
    terms:
      - 主营业务
  - pattern: "募资|募集资金"
    terms:
      - 募集资金
      - 投资项目
  - pattern: "股东|股权"
    terms:
      - 股东
      - 股权
      - 持股
